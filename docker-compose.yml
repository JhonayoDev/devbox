# ─────────────────────────────────────────────────────────────
#  devbox — docker-compose.yml
#
#  Uso:
#    cp .env.example .env        (y editá los valores)
#    docker compose up -d --build
#
#  Para borrar todo (contenedor + datos persistidos):
#    docker compose down
#    rm -rf /srv/datos/dev/devbox/nvim /srv/datos/dev/devbox/ssh-host-keys
# ─────────────────────────────────────────────────────────────

services:
  devbox:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${DEV_USERNAME:-juan}
        User_UID: ${DEV_UID:-1000}
        USER_GID: ${DEV_GID:-1000}
        DOTFILES_REPO: ${DOTFILES_REPO:-}

    container_name: devbox
    hostname: devbox
    ports:
      - "${SSH_PORT:-2222}:22"

    volumes:
      # ── Proyectos ──────────────────────────────────────────
      # El código vive en el host — sobrevive cualquier recreación
      - ${DEV_PROJECTS_PATH:-./projects}:/home/${DEV_USERNAME:-juan}/dev

      # ── SSH host keys ──────────────────────────────────────
      # Monta cada key individualmente para NO pisar el sshd_config
      # que el Dockerfile configura dentro del contenedor.
      - ./ssh-host-keys/ssh_host_rsa_key:/etc/ssh/ssh_host_rsa_key
      - ./ssh-host-keys/ssh_host_rsa_key.pub:/etc/ssh/ssh_host_rsa_key.pub
      - ./ssh-host-keys/ssh_host_ecdsa_key:/etc/ssh/ssh_host_ecdsa_key
      - ./ssh-host-keys/ssh_host_ecdsa_key.pub:/etc/ssh/ssh_host_ecdsa_key.pub
      - ./ssh-host-keys/ssh_host_ed25519_key:/etc/ssh/ssh_host_ed25519_key
      - ./ssh-host-keys/ssh_host_ed25519_key.pub:/etc/ssh/ssh_host_ed25519_key.pub

      # ── authorized_keys (clave pública del cliente) ────────
      - ${SSH_AUTHORIZED_KEYS_PATH:-./ssh/authorized_keys}:/run/secrets/authorized_keys:ro

      # ── Persistencia de Neovim ────────────────────────────
      # Bind mounts dentro de la carpeta del proyecto.
      # Para resetear nvim: rm -rf ./nvim/
      # Para borrar todo el devbox: eliminás la carpeta devbox/ completa
      #
      # ./nvim/data  → plugins de Lazy + binarios de Mason (jdtls, etc.)
      # ./nvim/cache → parsers de treesitter compilados, cache general
      - ./nvim/data:/home/${DEV_USERNAME:-juan}/.local/share/nvim
      - ./nvim/cache:/home/${DEV_USERNAME:-juan}/.cache/nvim
      # ruta de servicio en server, comentar en otros
      - ${SERVER_SERVICES_PATH:-}:/home/jhonayo/docker-services
    environment:
      USERNAME: ${DEV_USERNAME:-juan}
      TZ: ${TIMEZONE:-America/Argentina/Buenos_Aires}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "sh", "-c", "ss -tlnp | grep ':22'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
