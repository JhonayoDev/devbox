# ─────────────────────────────────────────────────────────────
#  devbox — docker-compose.yml
#
#  Uso:
#    cp env.example .env     (completar valores)
#    docker compose up -d --build
# ─────────────────────────────────────────────────────────────

services:
  devbox:
    container_name: ${CONTAINER_NAME:-devbox}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${DEV_USERNAME:-user}
        USER_UID: ${DEV_UID:-1000}
        USER_GID: ${DEV_GID:-1000}
        DOTFILES_REPO: ${DOTFILES_REPO:-}

    ports:
      - "${SSH_PORT:-2222}:22"

    volumes:
      # El código vive en el host — sobrevive cualquier recreación
      - ${DEV_PROJECTS_PATH:-./projects}:/home/${DEV_USERNAME:-user}/dev

      # ── authorized_keys (clave pública del cliente SSH) ────
      - ${SSH_AUTHORIZED_KEYS_PATH:-./ssh/authorized_keys}:/run/secrets/authorized_keys:ro

      # ── Persistencia de Neovim ─────────────────────────────
      - nvim_data:/home/${DEV_USERNAME:-user}/.local/share/nvim
      - nvim_cache:/home/${DEV_USERNAME:-user}/.cache/nvim

      # ── Servicios del servidor (opcional) ─────────────────
      # Ejemplo en servidor: SERVER_SERVICES_PATH=/opt/docker
      # ${SERVER_SERVICES_PATH}:/home/${DEV_USERNAME:-user}/docker-services

      - ${SSH_AUTH_SOCK:-/tmp/ssh-agent}:/ssh-agent

    environment:
      USERNAME: ${DEV_USERNAME:-user}
      TZ: ${TIMEZONE:-America/Santiago}

      SSH_AUTH_SOCK: /ssh-agent

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "sh", "-c", "ss -tlnp | grep ':22'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
volumes:
  nvim_data:
  nvim_cache:
