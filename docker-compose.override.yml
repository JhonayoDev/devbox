# ─────────────────────────────────────────────────────────────
#  Capa personal — NO compartir, va en .gitignore del proyecto
#
#  Agrega SSH + Neovim + dotfiles encima de cualquier devcontainer.
#  Copiá este archivo a la raíz del proyecto y ajustá las rutas.
#
#  Uso:
#    cp ~/devbox/docker-compose.override.yml .
#    docker compose up -d
#    ssh -p ${SSH_PORT} ${DEV_USERNAME}@localhost
# ─────────────────────────────────────────────────────────────

services:
  # Nombre del servicio definido en el devcontainer.json del proyecto
  # Cambiarlo si el proyecto usa otro nombre (ej: "app", "workspace")
  devcontainer:
    ports:
      - "${SSH_PORT:-2223}:22"
    volumes:
      # ── SSH host keys ──────────────────────────────────────
      - ${DEVBOX_PATH}/ssh-host-keys/ssh_host_rsa_key:/etc/ssh/ssh_host_rsa_key
      - ${DEVBOX_PATH}/ssh-host-keys/ssh_host_rsa_key.pub:/etc/ssh/ssh_host_rsa_key.pub
      - ${DEVBOX_PATH}/ssh-host-keys/ssh_host_ecdsa_key:/etc/ssh/ssh_host_ecdsa_key
      - ${DEVBOX_PATH}/ssh-host-keys/ssh_host_ecdsa_key.pub:/etc/ssh/ssh_host_ecdsa_key.pub
      - ${DEVBOX_PATH}/ssh-host-keys/ssh_host_ed25519_key:/etc/ssh/ssh_host_ed25519_key
      - ${DEVBOX_PATH}/ssh-host-keys/ssh_host_ed25519_key.pub:/etc/ssh/ssh_host_ed25519_key.pub
      # ── authorized_keys ────────────────────────────────────
      - ${SSH_AUTHORIZED_KEYS_PATH}:/run/secrets/authorized_keys:ro
      # ── Persistencia de Neovim ─────────────────────────────
      - ${DEVBOX_PATH}/nvim/data:/home/${DEV_USERNAME:-user}/.local/share/nvim
      - ${DEVBOX_PATH}/nvim/cache:/home/${DEV_USERNAME:-user}/.cache/nvim
    environment:
      USERNAME: ${DEV_USERNAME:-user}
      TZ: ${TIMEZONE:-America/Santiago}
